<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        .image-card {
            position: relative;
            width: 156px;
            height: 156px;
            margin: 0 auto 20px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 3px;
            box-shadow: 
                0 0 30px rgba(0, 255, 128, 0.2),
                0 0 60px rgba(0, 255, 128, 0.1);
        }
        
        .border-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 156px;
            height: 156px;
            z-index: 10;
            pointer-events: none;
        }
        
        /* 头部圆点样式 */
        .dot-head {
            fill: #00ff88;
            filter: drop-shadow(0 0 8px #00ff88) drop-shadow(0 0 16px #00ff88);
        }
        
        /* 拖尾样式 */
        .trail {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .image-inner {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 150px;
            height: 150px;
            z-index: 5;
            border-radius: 13px;
            overflow: hidden;
            background: #2a2a2a;
        }
        
        .handshake-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-card">
            <svg class="border-svg" viewBox="0 0 156 156">
                <defs>
                    <!-- 边框路径 -->
                    <path id="borderPath" d="M 13 1.5 L 143 1.5 Q 154.5 1.5 154.5 13 L 154.5 143 Q 154.5 154.5 143 154.5 L 13 154.5 Q 1.5 154.5 1.5 143 L 1.5 13 Q 1.5 1.5 13 1.5 Z"/>
                    
                    <!-- 拖尾渐变 -->
                    <linearGradient id="trailGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
                        <stop offset="25%" style="stop-color:#00dd77;stop-opacity:0.8" />
                        <stop offset="55%" style="stop-color:#00aa55;stop-opacity:0.4" />
                        <stop offset="85%" style="stop-color:#006633;stop-opacity:0.1" />
                        <stop offset="100%" style="stop-color:#004422;stop-opacity:0" />
                    </linearGradient>
                </defs>
                
                <!-- 拖尾路径：使用渐变，长度60 -->
                <use href="#borderPath" class="trail" 
                     stroke="url(#trailGradient)" 
                     stroke-width="6"
                     stroke-dasharray="60 450"
                     stroke-dashoffset="0">
                    <animate attributeName="stroke-dashoffset" 
                             values="0;-510" 
                             dur="3s" 
                             repeatCount="indefinite"/>
                </use>
                
                <!-- 头部圆点：直径约10px，与线条粗细相当 -->
                <circle r="5" class="dot-head">
                    <animateMotion dur="3s" repeatCount="indefinite">
                        <mpath href="#borderPath"/>
                    </animateMotion>
                </circle>
            </svg>
            
            <div class="image-inner">
                <img src="handshake.jpg" alt="握手" class="handshake-img">
            </div>
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
