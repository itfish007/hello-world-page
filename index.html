<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        /* 旋转渐变边框效果 */
        .image-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
            padding: 3px;
            border-radius: 18px;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                #00d4ff 10%,
                #ffffff 25%,
                #00d4ff 40%,
                transparent 50%,
                transparent 60%,
                #0099ff 70%,
                #ffffff 85%,
                #00d4ff 95%,
                transparent 100%
            );
            animation: rotate-border 3s linear infinite;
        }
        
        @keyframes rotate-border {
            0% {
                background: conic-gradient(
                    from 0deg,
                    transparent 0%,
                    #00d4ff 10%,
                    #ffffff 25%,
                    #00d4ff 40%,
                    transparent 50%,
                    transparent 60%,
                    #0099ff 70%,
                    #ffffff 85%,
                    #00d4ff 95%,
                    transparent 100%
                );
            }
            100% {
                background: conic-gradient(
                    from 360deg,
                    transparent 0%,
                    #00d4ff 10%,
                    #ffffff 25%,
                    #00d4ff 40%,
                    transparent 50%,
                    transparent 60%,
                    #0099ff 70%,
                    #ffffff 85%,
                    #00d4ff 95%,
                    transparent 100%
                );
            }
        }
        
        /* 内层遮罩，只显示边框 */
        .image-wrapper::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            z-index: 1;
        }
        
        .handshake-img {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <img src="handshake.jpg" alt="握手" class="handshake-img">
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
