<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        /* 图片卡片容器 - 深色背景 + 发光效果 */
        .image-card {
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 4px;
            box-shadow: 
                0 0 20px rgba(0, 255, 128, 0.15),
                0 0 40px rgba(0, 255, 128, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        
        /* 顶部流动的绿色光条 */
        .image-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                transparent 20%,
                #00ff88 40%,
                #00ffaa 50%,
                #00ff88 60%,
                transparent 80%,
                transparent 100%
            );
            animation: flow-light 2s linear infinite;
            z-index: 10;
            box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
        }
        
        /* 四周边框微光 */
        .image-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(
                135deg,
                rgba(0, 255, 128, 0.4) 0%,
                rgba(0, 255, 128, 0.1) 25%,
                transparent 50%,
                rgba(0, 255, 128, 0.1) 75%,
                rgba(0, 255, 128, 0.4) 100%
            );
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: border-shimmer 3s ease-in-out infinite;
        }
        
        @keyframes flow-light {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }
        
        @keyframes border-shimmer {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }
        
        /* 图片容器 */
        .image-inner {
            position: relative;
            z-index: 5;
            border-radius: 12px;
            overflow: hidden;
            background: #2a2a2a;
        }
        
        .handshake-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-card">
            <div class="image-inner">
                <img src="handshake.jpg" alt="握手" class="handshake-img">
            </div>
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
