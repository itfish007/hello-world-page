<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        /* 图片容器 */
        .image-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: visible;
        }
        
        .handshake-img {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        /* SVG 激光边框 */
        .laser-border {
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            z-index: 1;
            pointer-events: none;
        }
        
        .laser-path {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 12px currentColor);
        }
        
        /* 激光头部 - 最亮 */
        .laser-head {
            stroke: #ffffff;
            stroke-dasharray: 20 600;
            animation: laserFlow 2s linear infinite;
        }
        
        /* 激光中部 - 中等亮度 */
        .laser-mid {
            stroke: #00d4ff;
            stroke-dasharray: 20 600;
            animation: laserFlow 2s linear infinite;
            animation-delay: -0.3s;
            opacity: 0.7;
        }
        
        /* 激光尾部 - 淡色 */
        .laser-tail {
            stroke: #0099cc;
            stroke-dasharray: 30 590;
            animation: laserFlow 2s linear infinite;
            animation-delay: -0.6s;
            opacity: 0.4;
        }
        
        /* 更淡的尾部拖影 */
        .laser-fade {
            stroke: #006699;
            stroke-dasharray: 40 580;
            animation: laserFlow 2s linear infinite;
            animation-delay: -0.9s;
            opacity: 0.2;
        }
        
        @keyframes laserFlow {
            0% {
                stroke-dashoffset: 0;
            }
            100% {
                stroke-dashoffset: -620;
            }
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <!-- 激光边框 SVG -->
            <svg class="laser-border" viewBox="0 0 158 158" preserveAspectRatio="none">
                <!-- 边框路径 -->
                <defs>
                    <path id="borderPath" d="M 8 4 L 150 4 Q 154 4 154 8 L 154 150 Q 154 154 150 154 L 8 154 Q 4 154 4 150 L 4 8 Q 4 4 8 4 Z"/>
                </defs>
                
                <!-- 四层激光效果，从尾部到头部 -->
                <use href="#borderPath" class="laser-path laser-fade"/>
                <use href="#borderPath" class="laser-path laser-tail"/>
                <use href="#borderPath" class="laser-path laser-mid"/>
                <use href="#borderPath" class="laser-path laser-head"/>
            </svg>
            
            <img src="handshake.jpg" alt="握手" class="handshake-img">
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
