<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        /* 旋转边框效果 */
        .image-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
            border-radius: 18px;
            padding: 3px;
            overflow: hidden;
        }
        
        /* 旋转的渐变背景 */
        .image-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                #00d4ff 5%,
                #ffffff 15%,
                #00d4ff 25%,
                transparent 35%,
                transparent 45%,
                #0099ff 55%,
                #ffffff 65%,
                #00d4ff 75%,
                transparent 85%,
                transparent 100%
            );
            animation: rotate 3s linear infinite;
            z-index: 1;
        }
        
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* 内层遮罩 */
        .image-inner {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 3px;
        }
        
        .handshake-img {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            object-fit: cover;
            display: block;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <div class="image-inner">
                <img src="handshake.jpg" alt="握手" class="handshake-img">
            </div>
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
