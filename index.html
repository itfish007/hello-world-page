<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        /* 图片卡片 - 固定尺寸 */
        .image-card {
            position: relative;
            width: 156px;
            height: 156px;
            margin: 0 auto 20px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 3px;
            box-shadow: 
                0 0 30px rgba(0, 255, 128, 0.2),
                0 0 60px rgba(0, 255, 128, 0.1);
        }
        
        /* SVG 流动边框 - 精确匹配尺寸 */
        .border-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 156px;
            height: 156px;
            z-index: 10;
            pointer-events: none;
        }
        
        .border-line {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px #00ff88) drop-shadow(0 0 12px #00ff88);
        }
        
        .flow-head {
            stroke: #ffffff;
            stroke-dasharray: 30 480;
            animation: border-flow 2s linear infinite;
        }
        
        .flow-mid {
            stroke: #00ff88;
            stroke-dasharray: 30 480;
            animation: border-flow 2s linear infinite;
            animation-delay: -0.08s;
            opacity: 0.8;
        }
        
        .flow-tail {
            stroke: #00aa66;
            stroke-dasharray: 35 475;
            animation: border-flow 2s linear infinite;
            animation-delay: -0.16s;
            opacity: 0.5;
        }
        
        .flow-fade {
            stroke: #006633;
            stroke-dasharray: 40 470;
            animation: border-flow 2s linear infinite;
            animation-delay: -0.24s;
            opacity: 0.3;
        }
        
        @keyframes border-flow {
            0% {
                stroke-dashoffset: 0;
            }
            100% {
                stroke-dashoffset: -510;
            }
        }
        
        /* 图片容器 */
        .image-inner {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 150px;
            height: 150px;
            z-index: 5;
            border-radius: 13px;
            overflow: hidden;
            background: #2a2a2a;
        }
        
        .handshake-img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-card">
            <!-- SVG 流动边框 - 精确尺寸 -->
            <svg class="border-svg" viewBox="0 0 156 156">
                <defs>
                    <path id="rectPath" d="M 13 1.5 L 143 1.5 Q 154.5 1.5 154.5 13 L 154.5 143 Q 154.5 154.5 143 154.5 L 13 154.5 Q 1.5 154.5 1.5 143 L 1.5 13 Q 1.5 1.5 13 1.5 Z"/>
                </defs>
                
                <use href="#rectPath" class="border-line flow-fade"/>
                <use href="#rectPath" class="border-line flow-tail"/>
                <use href="#rectPath" class="border-line flow-mid"/>
                <use href="#rectPath" class="border-line flow-head"/>
            </svg>
            
            <div class="image-inner">
                <img src="handshake.jpg" alt="握手" class="handshake-img">
            </div>
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
