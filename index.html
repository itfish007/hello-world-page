<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        .image-card {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
        }
        
        /* SVG 边框 */
        .border-svg {
            position: absolute;
            top: -4px;
            left: -4px;
            width: 168px;
            height: 168px;
            z-index: 10;
            pointer-events: none;
        }
        
        .image-inner {
            position: relative;
            width: 160px;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .handshake-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-card">
            <!-- 彗星流动边框 -->
            <svg class="border-svg" viewBox="0 0 168 168">
                <defs>
                    <!-- 边框路径 -->
                    <path id="borderPath" d="M 16 4 L 152 4 Q 164 4 164 16 L 164 152 Q 164 164 152 164 L 16 164 Q 4 164 4 152 L 4 16 Q 4 4 16 4 Z"/>
                    
                    <!-- 拖尾渐变 - 亮绿到透明 -->
                    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#00ff88"/>
                        <stop offset="5%" style="stop-color:#00ff88"/>
                        <stop offset="25%" style="stop-color:#00dd66"/>
                        <stop offset="50%" style="stop-color:#00aa44"/>
                        <stop offset="75%" style="stop-color:#006622"/>
                        <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
                    </linearGradient>
                    
                    <!-- 发光滤镜 -->
                    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
                        <feGaussianBlur stdDeviation="4" result="blur1"/>
                        <feGaussianBlur stdDeviation="8" result="blur2"/>
                        <feMerge>
                            <feMergeNode in="blur2"/>
                            <feMergeNode in="blur1"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- 组件 1: 拖尾 -->
                <use href="#borderPath" fill="none" stroke="url(#tailGrad)" stroke-width="8" 
                     stroke-dasharray="100 450" stroke-linecap="round">
                    <animate attributeName="stroke-dashoffset" values="0;-550" dur="2.5s" repeatCount="indefinite"/>
                </use>
                
                <!-- 组件 2: 亮点头部 -->
                <use href="#borderPath" fill="none" stroke="#ffffff" stroke-width="10" 
                     stroke-dasharray="0 550" stroke-linecap="round">
                    <animate attributeName="stroke-dashoffset" values="-20;-570" dur="2.5s" repeatCount="indefinite"/>
                </use>
                
                <!-- 组件 3: 最亮的核心点 -->
                <use href="#borderPath" fill="none" stroke="#00ff88" stroke-width="6" 
                     stroke-dasharray="0 550" stroke-linecap="round" filter="url(#strongGlow)">
                    <animate attributeName="stroke-dashoffset" values="-25;-575" dur="2.5s" repeatCount="indefinite"/>
                </use>
            </svg>
            
            <div class="image-inner">
                <img src="handshake.jpg" alt="握手" class="handshake-img">
            </div>
        </div>
        <h1>Hello World!</h1>
        <p>你好，世界！这是小黑马为你生成的网页 🎉</p>
    </div>
</body>
</html>
